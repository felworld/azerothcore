name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Serialize runs per ref so each run finishes and saves its ccache before the
# next one restores it. Canceling in progress would discard the superseded
# run's compiler cache (the cache post-steps never see a completed build),
# leaving every subsequent run to compile from a stale snapshot. GitHub keeps
# only the newest queued run per group, so the backlog is at most one run.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      # The container build needs room for two full compiles' worth of objects;
      # drop the biggest preinstalled toolchains we never use.
      - name: Free up runner disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # The default GITHUB_TOKEN is scoped to this repo only; the
          # submodules are private felworld repos, so checkout needs a
          # fine-grained PAT that can read them (fall back to the default
          # token so the main checkout still works if the secret is unset).
          token: ${{ secrets.GH_FELWORLD_TOKEN || github.token }}

      # Persist the container build's compiler cache across runs: restore the
      # ./ccache directory from the Actions cache, inject it into the
      # Dockerfile's /ccache cache mount, and (via the same action's post step)
      # extract it back out so actions/cache saves the updated contents.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: unit-tests-ccache-${{ github.sha }}
          restore-keys: |
            unit-tests-ccache-

      - name: Inject ccache into the container build
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "ccache": "/ccache"
            }

      # Builds the unit-tests stage of apps/docker/Dockerfile; the suite runs
      # as the final build step, so the build succeeds iff the tests pass.
      - name: Build and run the test suite
        run: apps/docker/run-unit-tests.sh
        env:
          CONTAINER_ENGINE: docker
