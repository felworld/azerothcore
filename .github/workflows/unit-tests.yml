name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      # The container build needs room for two full compiles' worth of objects;
      # drop the biggest preinstalled toolchains we never use.
      - name: Free up runner disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Persist the container build's compiler cache across runs: restore the
      # ./ccache directory from the Actions cache, inject it into the
      # Dockerfile's /ccache cache mount, and (via the same action's post step)
      # extract it back out so actions/cache saves the updated contents.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: unit-tests-ccache-${{ github.sha }}
          restore-keys: |
            unit-tests-ccache-

      - name: Inject ccache into the container build
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "ccache": "/ccache"
            }

      # Builds the unit-tests stage of apps/docker/Dockerfile; the suite runs
      # as the final build step, so the build succeeds iff the tests pass.
      - name: Build and run the test suite
        run: apps/docker/run-unit-tests.sh
        env:
          CONTAINER_ENGINE: docker
