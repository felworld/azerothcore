# docker-compose.yml for AzerothCore.
#
# Start the server with `docker compose up -d --build`
#
# Don't make changes this file! make a `docker-compose.override.yml` and make your
# changes there instead.

services:
  ac-database:
    container_name: ac-database
    image: mysql:8.4
    networks:
      - ac-network
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-3306}:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-password}
    volumes:
      - ${DOCKER_VOL_DB:-ac-database}:/var/lib/mysql
      # MySQL tuning for the playerbots write load (loads last via the "zz-"
      # prefix, so it overrides the image defaults). See the file's header.
      - ${DOCKER_DB_CONF_FILE:-./conf/dist/mysql/playerbots.cnf}:/etc/mysql/conf.d/zz-playerbots.cnf:ro
    restart: unless-stopped
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 5s
      timeout: 10s
      retries: 40

  ac-db-import:
    container_name: ac-db-import
    image: acore/ac-wotlk-db-import:${DOCKER_IMAGE_TAG:-master}
    networks:
      - ac-network
    build:
      context: .
      target: db-import
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
      # SQL source mounted at runtime instead of baked into the image, so the
      # ~800MB data/ tree stays out of the build context (see .dockerignore).
      # dbimport reads from SourceDirectory (defaults to the compiled-in
      # /azerothcore), so this must land at /azerothcore/data. NB: distinct from
      # DOCKER_VOL_DATA (the extracted *client* data volume on worldserver).
      - ${DOCKER_VOL_DATA_SRC:-./data}:/azerothcore/data:ro
    depends_on:
      ac-database:
        condition: service_healthy

  ac-worldserver:
    container_name: ac-worldserver
    image: acore/ac-wotlk-worldserver:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: worldserver
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    networks:
      - ac-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    # List form (not a map) so the canned-chatter overrides below can be listed
    # value-less — a bare `- KEY` is passed through only when it's set in the
    # active env file, and omitted otherwise. A `KEY: value` map can't express
    # that (it would always set the key, clobbering the .conf in every mode).
    environment:
      - AC_DATA_DIR=/azerothcore/env/dist/data
      - AC_LOGS_DIR=/azerothcore/env/dist/logs
      - AC_LOGIN_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth
      - AC_WORLD_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world
      - AC_CHARACTER_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters
      - AC_PLAYERBOTS_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_playerbots
      # Session-mode toggles. AC reads AC_<OPTION> env vars in preference to the
      # matching .conf value at lookup time (see src/common/Configuration/
      # Config.cpp), so these override AiPlayerbot.Enabled / OllamaChat.Enable in
      # env/dist/etc/modules/{playerbots,mod_ollama_chat}.conf with no conf edit
      # or rebuild — a mode switch is just a different --env-file + `up -d`.
      # Pick a mode via one of the tracked .env.<mode> files:
      #   .env.solo      bots off, ollama off
      #   .env.dumbbots  bots on,  ollama off
      #   .env.ollama    bots on,  ollama on  (also activates the ollama profile)
      # Defaults here apply to a bare `up -d` (no --env-file): bots on, ollama
      # off — consistent with the ac-ollama container being profile-gated below.
      - AC_AI_PLAYERBOT_ENABLED=${AC_AI_PLAYERBOT_ENABLED:-1}
      - AC_OLLAMA_CHAT_ENABLE=${AC_OLLAMA_CHAT_ENABLE:-0}
      # Playerbots' own canned chatter, which mod-ollama-chat replaces with LLM
      # output — this is the exact set its README recommends disabling. Listed
      # value-less: ONLY .env.ollama sets them (to 0), forcing them off in ollama
      # mode; in solo/dumbbots they stay unset here so the playerbots.conf values
      # win (dumbbots relies on the .conf alone). NB: AiPlayerbot.GuildFeedback
      # isn't implemented in this mod-playerbots build (vestigial .conf line), so
      # its override is currently inert — kept for README parity / future-proofing.
      - AC_AI_PLAYERBOT_ENABLE_BROADCASTS
      - AC_AI_PLAYERBOT_RANDOM_BOT_TALK
      - AC_AI_PLAYERBOT_RANDOM_BOT_EMOTE
      - AC_AI_PLAYERBOT_RANDOM_BOT_SUGGEST_DUNGEONS
      - AC_AI_PLAYERBOT_ENABLE_GREET
      - AC_AI_PLAYERBOT_GUILD_FEEDBACK
      - AC_AI_PLAYERBOT_RANDOM_BOT_SAY_WITHOUT_MASTER
    ports:
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
      # client data
      - ${DOCKER_VOL_DATA:-ac-client-data}:/azerothcore/env/dist/data/:ro
      # Module SQL needed at runtime. Module-owned databases (e.g.
      # mod-playerbots' acore_playerbots) aren't handled by db-import: it only
      # loads the three core pools. Such modules create/migrate their own DB from
      # a DatabaseScript hook that runs only inside worldserver, reading SQL from
      # /azerothcore/modules/<mod>/data/sql. Mounting (vs. baking into the image)
      # keeps the SQL in sync with the submodules without rebuilding.
      - ${DOCKER_VOL_MODULES:-./modules}:/azerothcore/modules:ro
    depends_on:
      ac-database:
        condition: service_healthy
      ac-db-import:
        condition: service_completed_successfully
      ac-client-data-init:
        condition: service_completed_successfully

  ac-authserver:
    container_name: ac-authserver
    image: acore/ac-wotlk-authserver:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: authserver
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    networks:
      - ac-network
    tty: true
    restart: unless-stopped
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    environment:
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_TEMP_DIR: "/azerothcore/env/dist/temp"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
    depends_on:
      ac-database:
        condition: service_healthy
      ac-db-import:
        condition: service_completed_successfully

  # Ollama LLM server used by mod-ollama-chat. Runs on the NVIDIA GPU (requires
  # the NVIDIA Container Toolkit on the host) and auto-pulls the model on first
  # start. worldserver reaches it over ac-network at http://ac-ollama:11434 —
  # see OllamaChat.Url in env/dist/etc/modules/mod_ollama_chat.conf. There is
  # intentionally no depends_on from worldserver: the module calls Ollama
  # lazily, so a missing GPU / failed pull won't block the game server.
  ac-ollama:
    container_name: ac-ollama
    image: ollama/ollama
    # Profile-gated: only created/started when the active env file sets
    # COMPOSE_PROFILES=ollama (i.e. .env.ollama). In solo/dumbbots modes — and on
    # a bare `up -d` — the container is never started, so no GPU/VRAM is used.
    # Safe to gate because nothing depends_on it (the module calls Ollama lazily
    # over ac-network). NB: `up` won't STOP an already-running ollama when you
    # switch away; stop it explicitly if you want the VRAM back.
    profiles: [ollama]
    networks:
      - ac-network
    ports:
      - ${DOCKER_OLLAMA_EXTERNAL_PORT:-11434}:11434
    environment:
      # Bind all interfaces so other containers can reach it by service name
      # (the image otherwise listens on 127.0.0.1 only).
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ${DOCKER_VOL_OLLAMA:-ac-ollama}:/root/.ollama
      # Starts the server, then pulls the model on first run (see the script).
      - ./apps/docker/ollama-entrypoint.sh:/usr/local/bin/ollama-entrypoint.sh:ro
    restart: unless-stopped
    entrypoint: ["bash", "/usr/local/bin/ollama-entrypoint.sh"]
    healthcheck:
      # Healthy only once the model has finished downloading.
      test: ["CMD-SHELL", "ollama list | grep -q gemma4 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 120
      start_period: 20s
    # GPU passthrough. This stack runs under rootless podman, which IGNORES the
    # Docker Compose `deploy.resources.reservations.devices` (nvidia driver)
    # syntax — that's a Docker-runtime hook. Podman consumes the GPU as a CDI
    # device generated by `nvidia-ctk cdi generate` (see /etc/cdi/nvidia.yaml);
    # nvidia.com/gpu=all is podman's equivalent of `--gpus=all`. Under plain
    # Docker instead, swap this for the `deploy:` reservation block.
    devices:
      - nvidia.com/gpu=all

  ac-client-data-init:
    container_name: ac-client-data-init
    image: acore/ac-wotlk-client-data:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: client-data
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    volumes:
      - ${DOCKER_VOL_DATA:-ac-client-data}:/azerothcore/env/dist/data

  # used for extracting maps from files shipped with game client
  # Most of the time this shouldn't be needed
  ac-tools:
    container_name: ac-tools
    image: acore/ac-wotlk-tools:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      target: tools
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    working_dir: /azerothcore/env/client/
    volumes:
      # this is not the directory of the extracted data! It's the client folder used by the extractors
      - ${DOCKER_AC_CLIENT_FOLDER:-./var/client}:/azerothcore/env/dist/bin/Data
    # Activate with `docker compose --profile tools ...`
    profiles: [tools]

  # Dev server with the ./azerothcore folder binded from the host
  # Please use Linux, WSL2 or any ext-compatible filesystem
  # to avoid performance issues
  #
  # This is primarily intended for use with the "devcontainer" project
  #
  # This is provided primarily for development, though it doesn't receive
  # first-class support
  ac-dev-server:
    tty: true
    image: acore/ac-wotlk-dev-server:${DOCKER_IMAGE_TAG:-master}
    build:
      context: .
      dockerfile: ./apps/docker/Dockerfile.dev-server
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
      target: dev
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
    networks:
      - ac-network
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    volumes:
      - ${DOCKER_VOL_ROOT:-.}:/azerothcore:cached
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ac-build-dev:/azerothcore/var/build
      - ac-ccache-dev:/azerothcore/var/ccache
      # this is not the directory of the extracted data! It's the client folder used by the extractors
      - ${DOCKER_AC_CLIENT_FOLDER:-./var/client}:/azerothcore/env/dist/bin/Data
    # Activate with `docker compose --profile dev ...`
    profiles: [dev]
    depends_on:
      ac-database:
        condition: service_healthy

volumes:
  ac-database:
  ac-client-data:
  ac-ollama:
  # Used for dev server
  ac-build-dev:
  ac-ccache-dev:

networks:
  ac-network:
