# docker-compose.yml for AzerothCore.
#
# Start the server with `docker compose up -d --build`
#
# Don't make changes this file! make a `docker-compose.override.yml` and make your
# changes there instead.

services:
  ac-database:
    container_name: ac-database
    image: mysql:8.4
    networks:
      - ac-network
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-3306}:3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-password}
    volumes:
      - ${DOCKER_VOL_DB:-ac-database}:/var/lib/mysql
      # MySQL tuning for the playerbots write load (loads last via the "zz-"
      # prefix, so it overrides the image defaults). See the file's header.
      - ${DOCKER_DB_CONF_FILE:-./conf/dist/mysql/playerbots.cnf}:/etc/mysql/conf.d/zz-playerbots.cnf:ro
    restart: unless-stopped
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 5s
      timeout: 10s
      retries: 40

  ac-db-import:
    container_name: ac-db-import
    # All ac-* images below live under "felworld/" (not upstream's "acore/"):
    # they are built from this fork, and reusing upstream's Docker Hub names
    # would let a stray `pull` shadow the local builds with stock AzerothCore
    # images. The default tag matches this fork's branch (main), mirroring
    # upstream's master-branch/:master convention; DOCKER_IMAGE_TAG overrides.
    image: felworld/ac-wotlk-db-import:${DOCKER_IMAGE_TAG:-main}
    networks:
      - ac-network
    build:
      context: .
      target: db-import
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
      # SQL source mounted at runtime instead of baked into the image, so the
      # ~800MB data/ tree stays out of the build context (see .dockerignore).
      # dbimport reads from SourceDirectory (defaults to the compiled-in
      # /azerothcore), so this must land at /azerothcore/data. NB: distinct from
      # DOCKER_VOL_DATA (the extracted *client* data volume on worldserver).
      - ${DOCKER_VOL_DATA_SRC:-./data}:/azerothcore/data:ro
    depends_on:
      ac-database:
        condition: service_healthy

  ac-worldserver:
    container_name: ac-worldserver
    image: felworld/ac-wotlk-worldserver:${DOCKER_IMAGE_TAG:-main}
    build:
      context: .
      target: worldserver
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    networks:
      - ac-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    # List form (not a map) so the canned-chatter overrides below can be listed
    # value-less — a bare `- KEY` is passed through only when it's set in the
    # active env file, and omitted otherwise. A `KEY: value` map can't express
    # that (it would always set the key, clobbering the .conf in every mode).
    environment:
      - AC_DATA_DIR=/azerothcore/env/dist/data
      - AC_LOGS_DIR=/azerothcore/env/dist/logs
      - AC_LOGIN_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth
      - AC_WORLD_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world
      - AC_CHARACTER_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters
      - AC_PLAYERBOTS_DATABASE_INFO=ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_playerbots
      # Session-mode toggles. AC reads AC_<OPTION> env vars in preference to the
      # matching .conf value at lookup time (see src/common/Configuration/
      # Config.cpp), so these override AiPlayerbot.Enabled / LLM.Enable in
      # env/dist/etc/modules/{playerbots,mod_llm}.conf with no conf edit
      # or rebuild — a mode switch is just a different --env-file + `up -d`.
      # Pick a mode via one of the tracked .env.<mode> files:
      #   .env.solo      bots off, llm off
      #   .env.dumbbots  bots on,  llm off
      #   .env.llm       bots on,  llm on  (also activates the llm profile)
      # Defaults here apply to a bare `up -d` (no --env-file): bots on, llm
      # off — consistent with the ac-vllm container being profile-gated below.
      - AC_AI_PLAYERBOT_ENABLED=${AC_AI_PLAYERBOT_ENABLED:-1}
      - AC_LLM_ENABLE=${AC_LLM_ENABLE:-0}
      # Playerbots' own canned chatter, which mod-llm replaces with LLM
      # output. Listed value-less: ONLY .env.llm sets them (to 0), forcing them
      # off in llm mode; in solo/dumbbots they stay unset here so the
      # playerbots.conf values win (dumbbots relies on the .conf alone). NB:
      # AiPlayerbot.GuildFeedback isn't implemented in this mod-playerbots build
      # (vestigial .conf line), so its override is currently inert — kept for
      # README parity / future-proofing.
      - AC_AI_PLAYERBOT_ENABLE_BROADCASTS
      - AC_AI_PLAYERBOT_RANDOM_BOT_TALK
      - AC_AI_PLAYERBOT_RANDOM_BOT_EMOTE
      - AC_AI_PLAYERBOT_RANDOM_BOT_SUGGEST_DUNGEONS
      - AC_AI_PLAYERBOT_ENABLE_GREET
      - AC_AI_PLAYERBOT_GUILD_FEEDBACK
      - AC_AI_PLAYERBOT_RANDOM_BOT_SAY_WITHOUT_MASTER
    ports:
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
      # client data
      - ${DOCKER_VOL_DATA:-ac-client-data}:/azerothcore/env/dist/data/:ro
      # Module SQL needed at runtime. Module-owned databases (e.g.
      # mod-playerbots' acore_playerbots) aren't handled by db-import: it only
      # loads the three core pools. Such modules create/migrate their own DB from
      # a DatabaseScript hook that runs only inside worldserver, reading SQL from
      # /azerothcore/modules/<mod>/data/sql. Mounting (vs. baking into the image)
      # keeps the SQL in sync with the submodules without rebuilding.
      - ${DOCKER_VOL_MODULES:-./modules}:/azerothcore/modules:ro
    depends_on:
      ac-database:
        condition: service_healthy
      ac-db-import:
        condition: service_completed_successfully
      ac-client-data-init:
        condition: service_completed_successfully

  ac-authserver:
    container_name: ac-authserver
    image: felworld/ac-wotlk-authserver:${DOCKER_IMAGE_TAG:-main}
    build:
      context: .
      target: authserver
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    networks:
      - ac-network
    tty: true
    restart: unless-stopped
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    environment:
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_TEMP_DIR: "/azerothcore/env/dist/temp"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
    volumes:
      - ${DOCKER_VOL_ETC:-./env/dist/etc}:/azerothcore/env/dist/etc
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/azerothcore/env/dist/logs:delegated
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
    depends_on:
      ac-database:
        condition: service_healthy
      ac-db-import:
        condition: service_completed_successfully

  # vLLM server used by mod-llm (OpenAI-compatible chat completions with tool
  # calling). Runs on the NVIDIA GPU (requires the NVIDIA Container Toolkit on
  # the host) and downloads the model from Hugging Face on first start.
  # worldserver reaches it over ac-network at http://ac-vllm:8000 — see
  # LLM.Endpoint in env/dist/etc/modules/mod_llm.conf. There is intentionally
  # no depends_on from worldserver: the module calls the endpoint lazily, so a
  # missing GPU / failed download won't block the game server.
  ac-vllm:
    container_name: ac-vllm
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-latest}
    # Profile-gated: only created/started when the active env file sets
    # COMPOSE_PROFILES=llm (i.e. .env.llm). In solo/dumbbots modes — and on a
    # bare `up -d` — the container is never started, so no GPU/VRAM is used.
    # Safe to gate because nothing depends_on it (the module calls the endpoint
    # lazily over ac-network). NB: `up` won't STOP an already-running vllm when
    # you switch away; stop it explicitly if you want the VRAM back.
    profiles: [llm]
    networks:
      - ac-network
    ports:
      - ${DOCKER_VLLM_EXTERNAL_PORT:-8000}:8000
    # vLLM wants a large shared-memory segment for tensor transfer.
    ipc: host
    environment:
      # Only needed for gated models (e.g. Llama); Qwen downloads anonymously.
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      # Set VLLM_HF_OFFLINE=1 to load straight from the cache volume with no
      # Hugging Face calls: faster startup, and immune to broken container
      # DNS. A model that is not yet cached needs 0 (the default) to download.
      HF_HUB_OFFLINE: ${VLLM_HF_OFFLINE:-0}
    # The model is swappable via VLLM_MODEL with no conf edit: the server
    # always announces it under the alias "felworld" (--served-model-name),
    # which is what LLM.Model in mod_llm.conf requests. Tool-call and
    # reasoning parsing are model-family-specific — keep VLLM_TOOL_PARSER and
    # VLLM_REASONING_PARSER in sync when changing models (qwen3_coder/qwen3
    # fit Qwen3.5; hermes for Qwen3/2.5; llama3_json for Llama 3.x; see the
    # vLLM tool-calling docs). Qwen3.5's hybrid GDN architecture needs
    # vLLM >= 0.17 — re-pull the image if the cached :latest predates it.
    # Thinking mode is off (--default-chat-template-kwargs): reasoning tokens
    # would eat the LLM.MaxTokens budget and multiply reply latency. Chat
    # templates without the flag (e.g. Qwen3-4B-Instruct-2507) ignore it.
    # Model size: Qwen3.5's 248k-token vocabulary keeps its embedding + lm_head
    # in fp16 even under AWQ (~1.9 GiB each), so checkpoints run far bigger
    # than the 4-bit rule of thumb suggests. The 4B AWQ is 5.65 GiB and leaves
    # KV-cache headroom on a 12 GB GPU; the 9B AWQ is 11.53 GiB and OOMs
    # before it finishes loading (2B AWQ, 3.04 GiB, is the step down).
    # GPU memory: the WoW client and desktop share this GPU (~1-2.5 GiB in
    # play), and vLLM budgets utilization x *total* VRAM regardless of what
    # others hold, so 0.85 OOMs once the game is running. Measured ledger at
    # 0.75 (of 11.62 GiB): 8.7 budget = 5.65 weights + ~1.7 activations +
    # ~1.3 KV cache (four full 8192-token sequences — GDN keeps KV tiny),
    # leaving ~2.9 GiB for the game. 0.65 left only 0.11 GiB KV and failed
    # startup ("To serve at least one request...").
    # --max-num-batched-tokens 1024 keeps the activation peak small: the
    # logits buffer alone is vocab (248k) x chunk x 2 bytes = ~0.5 GiB per
    # 1024-token prefill chunk, and every GiB shaved off the peak becomes
    # KV cache within the same budget. Long prompts just prefill in chunks.
    # --max-num-seqs matters just as much: CUDA graph capture and the GDN
    # recurrent-state pool are sized by max batch size and sit OUTSIDE the
    # utilization budget — the default (batches up to 512) allocated 1 GiB
    # chunks until the GPU OOM'd. mod-llm sends at most a handful of
    # concurrent requests (LLM.MaxConcurrentRequests), so 8 is generous.
    # If memory is still tight, add --enforce-eager (skips CUDA graph
    # capture, costs some latency) before reaching for the 2B model.
    command: >
      ${VLLM_MODEL:-QuantTrio/Qwen3.5-4B-AWQ}
      --served-model-name felworld
      --enable-auto-tool-choice
      --tool-call-parser ${VLLM_TOOL_PARSER:-qwen3_coder}
      --reasoning-parser ${VLLM_REASONING_PARSER:-qwen3}
      --default-chat-template-kwargs '{"enable_thinking": ${VLLM_ENABLE_THINKING:-false}}'
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --max-num-seqs ${VLLM_MAX_NUM_SEQS:-8}
      --max-num-batched-tokens ${VLLM_MAX_BATCHED_TOKENS:-1024}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.75}
    volumes:
      # Hugging Face cache: model downloads survive container replacement.
      - ${DOCKER_VOL_VLLM:-ac-vllm}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      # Healthy only once the model is downloaded, loaded, and serving.
      # Generous retries: the first start downloads several GB.
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 180
      start_period: 30s
    # GPU passthrough. This stack runs under rootless podman, which IGNORES the
    # Docker Compose `deploy.resources.reservations.devices` (nvidia driver)
    # syntax — that's a Docker-runtime hook. Podman consumes the GPU as a CDI
    # device generated by `nvidia-ctk cdi generate` (see /etc/cdi/nvidia.yaml);
    # nvidia.com/gpu=all is podman's equivalent of `--gpus=all`. Under plain
    # Docker instead, swap this for the `deploy:` reservation block.
    devices:
      - nvidia.com/gpu=all

  ac-client-data-init:
    container_name: ac-client-data-init
    image: felworld/ac-wotlk-client-data:${DOCKER_IMAGE_TAG:-main}
    build:
      context: .
      target: client-data
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    volumes:
      - ${DOCKER_VOL_DATA:-ac-client-data}:/azerothcore/env/dist/data

  # used for extracting maps from files shipped with game client
  # Most of the time this shouldn't be needed
  ac-tools:
    container_name: ac-tools
    image: felworld/ac-wotlk-tools:${DOCKER_IMAGE_TAG:-main}
    build:
      context: .
      target: tools
      dockerfile: apps/docker/Dockerfile
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
    working_dir: /azerothcore/env/client/
    volumes:
      # this is not the directory of the extracted data! It's the client folder used by the extractors
      - ${DOCKER_AC_CLIENT_FOLDER:-./var/client}:/azerothcore/env/dist/bin/Data
    # Activate with `docker compose --profile tools ...`
    profiles: [tools]

  # Dev server with the ./azerothcore folder binded from the host
  # Please use Linux, WSL2 or any ext-compatible filesystem
  # to avoid performance issues
  #
  # This is primarily intended for use with the "devcontainer" project
  #
  # This is provided primarily for development, though it doesn't receive
  # first-class support
  ac-dev-server:
    tty: true
    image: felworld/ac-wotlk-dev-server:${DOCKER_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: ./apps/docker/Dockerfile.dev-server
      args:
        USER_ID: ${DOCKER_USER_ID:-1000}
        GROUP_ID: ${DOCKER_GROUP_ID:-1000}
        DOCKER_USER: ${DOCKER_USER:-acore}
      target: dev
    env_file:
        ${DOCKER_AC_ENV_FILE:-conf/dist/env.ac}
    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
    networks:
      - ac-network
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    volumes:
      - ${DOCKER_VOL_ROOT:-.}:/azerothcore:cached
      # [osxfs optimization]: https://stackoverflow.com/a/63437557/1964544
      - ac-build-dev:/azerothcore/var/build
      - ac-ccache-dev:/azerothcore/var/ccache
      # this is not the directory of the extracted data! It's the client folder used by the extractors
      - ${DOCKER_AC_CLIENT_FOLDER:-./var/client}:/azerothcore/env/dist/bin/Data
    # Activate with `docker compose --profile dev ...`
    profiles: [dev]
    depends_on:
      ac-database:
        condition: service_healthy

volumes:
  ac-database:
  ac-client-data:
  ac-vllm:
  # Used for dev server
  ac-build-dev:
  ac-ccache-dev:

networks:
  ac-network:
